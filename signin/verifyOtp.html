<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-In-page</title>
    <link rel="stylesheet" href="verifyOtp.css">

    </head>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
<body>

    <div class="hack-box">
        

    </div>

    <div class="forget-password">
        <div class="welcome">
            Welcome to BIT_LX
        </div>
        <div class="forget-password-text">
            FORGET PASSWORD
        </div>
        <div class="enterotp-div">
            <input id="enterotp-id" type="text" placeholder="Enter OTP" >
        </div>
        <a href="signUp.html">
            <button class="verify-otp">
                VERIFY-OTP
            </button>
        </a>


    </div>

    <script>
    const grid = document.querySelector(".hack-box");
    const glitchContent = ["0", "1", "█", "▒", "░", "Ø", "×", "¿", "$", "_", "!", "▀","¿"
,"⸮"];

    for (let i = 0; i < 2000; i++) {
        const div = document.createElement("div");
        div.classList.add("box");
        const randomGlitch = glitchContent[Math.floor(Math.random() * glitchContent.length)];
    div.innerText = randomGlitch;
        grid.appendChild(div);
    }
</script>

</body>
</html>
