<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-In-page</title>
    <link rel="stylesheet" href="signIn.css">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
<body>

    <div class="hack-box">
        

    </div>

    <div class="sign-in">
        <div class="welcome">
            Welcome to BIT_LX
        </div>
        <div class="forget-password">
            FORGET PASSWORD
        </div>
        <div class="sign-in-id-div">
            <input id="sign-in-id" type="text" placeholder="Enter email" >
        </div>
        <button class="GET-OTP">
            GET OTP
        </button>


    </div>

    <script>
    const grid = document.querySelector(".hack-box");

    for (let i = 0; i < 2000; i++) {
        const div = document.createElement("div");
        div.classList.add("box");
        div.textContent = "?";   // <-- add question mark
        grid.appendChild(div);
    }
</script>

</body>
</html>
