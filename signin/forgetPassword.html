<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forget-password-change</title>
    <link rel="stylesheet" href="forgetPassword.css">

    <link rel="icon" type="image/png" href="logo.gif.gif">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        .status-msg {
        margin-top: 15px;
        font-family: 'Roboto', sans-serif;
        font-size: 14px;
        text-align: center;
        font-weight: 500;
    }
    </style>
</head>
<body>

    <div class="hack-box">
        

    </div>

    <div class="forget-password">
        <div class="welcome">
            Welcome to BIT_LX
        </div>
        <div class="forget-password-text">
            FORGET PASSWORD
        </div>
        <div class="enterMail-div">
            <input id="enterMail-id" type="text" placeholder="Enter email" >
        </div>
        <button class="GET-OTP" id="GET-OTP" onclick="sendOtpRequest()">
            GET OTP
        </button>

        <div id="statusReport" class="status-msg"></div>

    </div>
    <script>
    const grid = document.querySelector(".hack-box");
    const glitchContent = ["⸮","؟","❓","⁇","⁈","⁉","؟","ʔ","¿","⸮"];

    for (let i = 0; i < 2000; i++) {
        const div = document.createElement("div");
        div.classList.add("box");
        const randomGlitch = glitchContent[Math.floor(Math.random() * glitchContent.length)];
    div.innerText = randomGlitch;
        grid.appendChild(div);
    }
    function sendOtpRequest() {
        const emailValue = document.getElementById("enterMail-id").value.trim();
        const statusReport = document.getElementById("statusReport");
        const getOtpBtn = document.getElementById("GET-OTP");

        const bitmesraRegex = /^[a-zA-Z0-9._%+-]+@bitmesra\.ac\.in$/;    // verifying string strictly ends with @bitmesra.ac.in

        if (!emailValue || !bitmesraRegex.test(emailValue)) {  // verifying if user has entered email and it ends with @bitmessra.ac.in
            alert("Please enter a valid institutional email ending with @bitmesra.ac.in");
            return; // Terminates js immediately before hitting the network layer and the js stops
        }

        // 2. Visual Loading Indicators (Prevents form spam-clicking)
        getOtpBtn.disabled = true;
        getOtpBtn.innerText = "SENDING...";
        statusReport.style.color = "#e67e22"; // Orange loading color
        statusReport.innerText = "Verifying database status...";

        // 3. Fire the payload to your live Render server
        fetch("https://otp-api-kc55.onrender.com/send_otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            // Since your live backend takes a raw JSON-string body type:
            body: JSON.stringify({ to_email: emailValue })
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) {
                // Extracts explicit structural errors from FastAPI validations
                throw new Error(data.message || data.details || `Error: ${response.status}`);
            }
            return data;
        })
        .then(data => {
        // --- UPDATED LOGIC FOR THE NOT FOUND ALERT ---
        if (data.message && data.message.includes("user not found")) {
             // 1. Show the alert box first (freezes execution until user clicks 'OK')
            alert("Please sign up first, you are a new user.");
    
            // 2. Display the redirect status message elegantly in red/orange
            statusReport.style.color = "#e74c3c"; 
            statusReport.innerText = "User not found. Redirecting to sign up page...";
    
            // 3. Trigger the page switch after 1.5 seconds
            setTimeout(() => {
                window.location.href = "signUp.html";
            }, 1500);
        } 
        if (data.message && data.message.includes("OTP already exists")) {
             // 1. Show the alert box first (freezes execution until user clicks 'OK')
            alert("you have already received otp if not received then retry after 5 minutes");
        } 
        // Handle other business logic errors (like database failure or active OTP)
        else if (data.status === "error" || data.message.includes("exists")) {
            statusReport.style.color = "#e74c3c"; 
            statusReport.innerText = data.message;
            
            getOtpBtn.disabled = false;
            getOtpBtn.innerText = "GET OTP";
        } 
        // Success pathway
        else {
            statusReport.style.color = "#2ecc71"; 
            statusReport.innerText = "OTP generated! Redirecting...";
            
            sessionStorage.setItem("userEmailForOtp", emailValue);

            setTimeout(() => {
                window.location.href = "verifyOtp.html";
            }, 1500);
        }
        })
        .catch(error => {
            console.error("Critical core process break:", error);
            statusReport.style.color = "#e74c3c";
            statusReport.innerText = `System alert: ${error.message}`;
            
            // Re-enable interface components on network failures
            getOtpBtn.disabled = false;
            getOtpBtn.innerText = "GET OTP";
        });
    }
</script>
</body>
</html>
